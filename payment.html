<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securemove Logistics - Payment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>
<body>
    <header>
        <a href="#" class="logo"><img src="img/logo.jpg" alt="Logo"></a>
        <div class="bx bx-menu" id="menu"></div>
        <ul class="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#reviews">Reviews</a></li>
            <li><a href="#payment">Payment</a></li>
        </ul>
        <div class="header-btn">
            <a href="#" class="sign-up">Sign Up</a>
            <a href="#" class="login">Login</a>
        </div>
    </header>
    
    <section class="payment" id="payment">
        <div class="heading">
            <span>Secure Payment</span>
            <h1>Complete Your Payment</h1>
        </div>
        
        <div class="payment-container">
            <form id="payment-form">
                <label>Full Name</label>
                <input type="text" id="full-name" required>
                
                <label>Email Address</label>
                <input type="email" id="email" required>
                
                <label>Amount</label>
                <input type="number" id="amount" required>
                
                <label>Payment Method</label>
                <select id="payment-method" required>
                    <option value="credit-card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="bank-transfer">Bank Transfer</option>
                </select>
                
                <label>Card Number</label>
                <input type="text" id="card-number" required>
                
                <label>Expiry Date</label>
                <input type="month" id="expiry-date" required>
                
                <label>CVV</label>
                <input type="text" id="cvv" required>
                
                <button type="submit">Make Payment</button>
            </form>
        </div>
    </section>
    
    <footer>
        <p>&#169; Securemove Logistics All Rights Reserved</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
    <script>
        document.getElementById("menu").addEventListener("click", function() {
            document.querySelector(".navbar").classList.toggle("active");
        });
        
        document.getElementById("payment-form").addEventListener("submit", function(event) {
            event.preventDefault();
            
            const name = document.getElementById("full-name").value;
            const email = document.getElementById("email").value;
            const amount = document.getElementById("amount").value;
            
            alert("Payment Successful! A receipt will be sent to " + email);
            
            emailjs.init("2Nnqnp9MOTmOJlOkx");
            emailjs.send("service_s6hqmeh","template_gi6ceqb", { 
                user_name: name,
                amount: amount
            }).then(response => {
                console.log("Email sent successfully", response);
            }).catch(error => {
                console.error("Email sending failed", error);
            });
        });
    </script>
</body>
</html>
